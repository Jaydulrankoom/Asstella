policies:
  - displayName: "API Latency p99 > 3000ms"
    combiner: OR
    conditions:
      - displayName: "Cloud Run Revision - Request Latency"
        conditionThreshold:
          filter: >-
            resource.type = "cloud_run_revision" AND
            metric.type = "run.googleapis.com/request_latencies"
          aggregations:
            - alignmentPeriod: 300s
              crossSeriesReducer: REDUCE_PERCENTILE_99
              perSeriesAligner: ALIGN_DELTA
          comparison: COMPARISON_GT
          duration: 0s
          thresholdValue: 3000
    notificationChannels:
      # Replace with actual PagerDuty notification channel
      - "projects/.../notificationChannels/..."

  - displayName: "Error Rate > 2%"
    combiner: OR
    conditions:
      - displayName: "Cloud Run Revision - Error Rate"
        conditionThreshold:
          filter: >-
            resource.type = "cloud_run_revision" AND
            metric.type = "run.googleapis.com/request_count" AND
            metric.labels.response_code_class = "5xx"
          aggregations:
            - alignmentPeriod: 300s
              crossSeriesReducer: REDUCE_SUM
              perSeriesAligner: ALIGN_RATE
          comparison: COMPARISON_GT
          duration: 300s
          thresholdValue: 0.02

  - displayName: "Cloud Run Instance Count > 15"
    combiner: OR
    conditions:
      - displayName: "Cloud Run Revision - Instance Count"
        conditionThreshold:
          filter: >-
            resource.type = "cloud_run_revision" AND
            metric.type = "run.googleapis.com/container/instance_count"
          aggregations:
            - alignmentPeriod: 60s
              crossSeriesReducer: REDUCE_MAX
              perSeriesAligner: ALIGN_MAX
          comparison: COMPARISON_GT
          duration: 60s
          thresholdValue: 15

  - displayName: "Firebase Auth Failure Spike"
    combiner: OR
    conditions:
      - displayName: "Firebase Authentication - Failed Sign In"
        conditionThreshold:
          filter: >-
            resource.type = "firebase_auth" AND
            metric.type = "firebaseauth.googleapis.com/auth/failed_signin_count"
          aggregations:
            - alignmentPeriod: 300s
              crossSeriesReducer: REDUCE_SUM
              perSeriesAligner: ALIGN_RATE
          comparison: COMPARISON_GT
          duration: 300s
          thresholdValue: 50
